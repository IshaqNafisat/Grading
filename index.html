<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="enter">

    <button onclick="checkGrade()">Check</button>

    <p id="result"></p>

    <h3> Grade : <span id="Grade"></span></h3>
</body>
</html>

<script>
    // Assignnment
    //Write a code which can give grades to students according to theirs scores:
    //80-100, A
    //70-79, B
    //60-69, C
    //50-59, D
    //0-49, F

    //Math.random 0.01 - 0.999999 
    //0.01 *
   // let score = Math.floor(Math.random * 99 )
    
    let inputElement = document.getElementById('enter')
    let showResult = document.getElementById('result')
    let grade = document.getElementById('Grade')

    function checkGrade(){
        let inputValue = inputElement.value.trim()

        if (inputValue === ''){
            alert ('input field is mandatory')            
        } else if (isNaN(inputValue)){
            alert('score must be a number')
        } else if (Number(inputValue) < 0 ) {
            alert('score cannot be less than 0')
        } else if (Number(inputValue) > 100 ){
            alert ('score can not be greater than 100')
        } else {
            if (Number(inputValue) >= 80 ){
                grade.innerHTML = 'A'
            } else if (Number(inputValue) >= 70) {
                grade.innerHTML = 'B'                
            } else if (Number(inputValue) >= 60){
                grade.innerHTML = 'C'                
            } else if (Number(inputValue) >= 50){
                grade.innerHTML = 'D'
            }else if (Number(inputValue) >= 40){
                grade.innerHTML = 'E'
            } else {
                grade.innerHTML = 'F'
            }

        }
        inputElement.value = "";
    }

</script>
